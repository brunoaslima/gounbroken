    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>

    <!--
      SW recovery — runs inline, before any module bundle.
      If a JS/CSS asset 404s (stale service-worker serving old chunk names),
      we unregister every SW and do a hard network reload.
      This self-heals every deploy without user intervention.
    -->
    <script>
      (function () {
        // Catch resource-load errors (script, link) in capture phase
        window.addEventListener('error', function (e) {
          var t = e.target || e.srcElement
          if (!t) return
          var src = t.src || t.href || ''
          // Only act on our own bundled assets
          if (src.indexOf('/assets/') === -1) return
          // Unregister all SWs then hard-reload from network
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              var all = regs.map(function (r) { return r.unregister() })
              Promise.all(all).then(function () {
                // Clear all caches too
                if ('caches' in window) {
                  caches.keys().then(function (keys) {
                    keys.forEach(function (k) { caches.delete(k) })
                    window.location.reload()
                  })
                } else {
                  window.location.reload()
                }
              })
            })
          } else {
            window.location.reload()
          }
        }, true /* capture — catches resource errors before bubbling */)
      })()
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
